<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1512">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Japhe Farm">
<title>Japhe Farm — Onion Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230d1512'/%3E%3Cellipse cx='50' cy='58' rx='26' ry='30' fill='%234fae68'/%3E%3Cpath d='M50 28 L50 12 M42 20 L50 12 L58 20' stroke='%23eef2ea' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg-primary:#0d1512;
    --bg-surface:#141f19;
    --bg-elevated:#1c2b22;
    --text-primary:#eef2ea;
    --text-secondary:#93a99c;
    --text-muted:#5c7266;
    --accent:#4fae68;
    --accent-dark:#173325;
    --accent-sage:#7a9c85;
    --accent-dim:rgba(79,174,104,0.16);
    --status-success:#4fae68;
    --status-warning:#e0a83f;
    --status-danger:#d1603f;
    --border-subtle:#22302a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg-primary);color:var(--text-primary);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  .mono{font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,"Roboto Mono",monospace;}
  #root{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}

  .header{padding:20px 20px 4px;}
  .header .farmrow{display:flex; align-items:center; justify-content:space-between;}
  .header .farmname{font-size:17px; font-weight:700;}
  .header .date{font-size:12px; color:var(--text-secondary); margin-top:2px;}
  .badge{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
    background:var(--accent-dim);color:var(--accent);
    padding:4px 9px;border-radius:20px;
  }

  .home-wrap{ height:calc(100dvh - 76px); display:flex; flex-direction:column; overflow:hidden; }
  .home-body{ flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; padding-bottom:calc(4px + env(safe-area-inset-bottom)); }

  .hero{
    margin:10px 16px 0; background:var(--accent-dark); border-radius:22px;
    padding:20px 20px; position:relative; overflow:hidden; flex-shrink:0;
    display:flex; align-items:center; gap:16px; border:1px solid var(--border-subtle);
  }
  .hero::before{content:""; position:absolute; right:-30px; top:-30px; width:150px; height:150px; border-radius:50%; border:22px solid rgba(255,255,255,0.04);}
  .hero::after{content:""; position:absolute; right:18px; bottom:-40px; width:90px; height:90px; border-radius:50%; border:16px solid rgba(255,255,255,0.04);}
  .hero-ring-wrap{position:relative; width:78px; height:78px; flex-shrink:0;}
  .hero-num{font-size:36px; font-weight:800; color:#fff; line-height:1;}
  .hero-label{font-size:11px; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}
  .hero-sub{font-size:13.5px; color:rgba(255,255,255,0.8); margin-top:7px;}

  .attention-group{ flex:1; min-height:0; display:flex; flex-direction:column; padding:0 0 6px; }
  .section-label.tight{ margin:12px 0 7px; flex-shrink:0; }
  .card-list.tight{ flex:1; min-height:0; display:flex; flex-direction:column; gap:7px; }
  .card-list.tight > .event-card{ flex:1; min-height:0; padding:9px 14px; }
  .card-list.tight .ring-wrap{ width:42px; height:42px; }
  .card-list.tight .ring-num{ font-size:13px; }
  .card-list.tight .ev-name{ font-size:13.5px; }
  .card-list.tight .ev-sub{ font-size:11.5px; }
  .card-list.tight.one{ flex:0 0 auto; }
  .card-list.tight.one > .event-card{ flex:0 0 auto; padding:12px 16px; }
  .card-list.tight.one .ring-wrap{ width:48px; height:48px; }

  .hero-text{ min-width:0; flex:1; }
  .health-pill{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; vertical-align:middle; }
  .health-pill .dot{ width:6px; height:6px; border-radius:50%; }
  .health-pill.ok{ background:rgba(79,174,104,0.2); color:#8fe0a4; }
  .health-pill.ok .dot{ background:#8fe0a4; }
  .health-pill.warn{ background:rgba(224,168,63,0.2); color:#f0c675; }
  .health-pill.warn .dot{ background:#f0c675; }
  .health-pill.danger{ background:rgba(209,96,63,0.2); color:#f0a17f; }
  .health-pill.danger .dot{ background:#f0a17f; }
  .health-pill.neutral{ background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.65); }
  .health-pill.neutral .dot{ background:rgba(255,255,255,0.65); }

  .obs-card{
    margin:0 16px; background:var(--bg-surface); border:1px solid var(--border-subtle);
    border-radius:16px; padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .obs-card .ev-mid{ min-width:0; flex:1; }
  .obs-card .ev-sub{ font-size:11.5px; color:var(--text-secondary); margin-top:3px; }
  .obs-text{ font-size:13px; font-style:italic; line-height:1.35; color:var(--text-primary); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .empty-state.compact{ margin:10px 20px 0; padding:14px 16px; font-size:12.5px; flex-shrink:0; }

  .section-label{
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--text-muted); padding:0 20px; margin:22px 0 10px;
    display:flex; align-items:center; justify-content:space-between;
  }

  .card-list{padding:0 16px; display:flex; flex-direction:column; gap:10px;}
  .event-card{
    background:var(--bg-surface); border:1px solid var(--border-subtle);
    border-radius:16px; padding:14px 16px;
    display:flex; align-items:center; gap:14px;
  }
  .event-card.placeholder{ border-style:dashed; opacity:0.75; }
  .ring-wrap{position:relative; width:52px; height:52px; flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-num{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700;}
  .ring-num.neutral{ color:var(--accent-sage); }
  .event-card .ev-mid{min-width:0; flex:1;}
  .event-card .ev-name{font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .event-card .ev-sub{font-size:12px; color:var(--text-secondary); margin-top:2px;}
  .event-card .ev-obs{font-size:11.5px; color:var(--text-muted); margin-top:3px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ok{color:var(--status-success);}
  .warn{color:var(--status-warning);}
  .danger{color:var(--status-danger);}

  .timeline{padding:6px 20px 0; display:flex; gap:0; overflow-x:auto; -webkit-overflow-scrolling:touch; flex-shrink:0;}
  .timeline::-webkit-scrollbar{display:none;}
  .tl-item{flex-shrink:0; width:98px; display:flex; flex-direction:column; align-items:flex-start; position:relative; padding-right:12px;}
  .tl-dot{width:8px; height:8px; border-radius:50%; background:var(--accent-sage); margin-bottom:6px;}
  .tl-line{position:absolute; top:3px; left:8px; width:100%; height:1px; background:var(--border-subtle);}
  .tl-name{font-size:11.5px; font-weight:600; color:var(--text-primary); line-height:1.25;}
  .tl-date{font-size:10px; color:var(--text-muted); margin-top:2px;}

  .empty-state{margin:20px 20px 0; text-align:center; color:var(--text-secondary); font-size:13.5px; line-height:1.6; background:var(--bg-surface); border:1px dashed var(--border-subtle); border-radius:16px; padding:24px 16px;}

  .timeline-vertical{ margin:0 16px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:16px; }
  .tlv-item{ display:flex; gap:12px; }
  .tlv-marker{ display:flex; flex-direction:column; align-items:center; }
  .tlv-dot{ width:9px; height:9px; border-radius:50%; background:var(--accent-sage); flex-shrink:0; margin-top:4px; }
  .tlv-line{ width:1px; flex:1; background:var(--border-subtle); margin-top:4px; min-height:22px; }
  .tlv-content{ padding-bottom:16px; min-width:0; }
  .tlv-name{ font-size:13.5px; font-weight:700; }
  .tlv-date{ font-size:11.5px; color:var(--text-muted); margin-top:2px; }
  .empty-state .big{font-size:30px; margin-bottom:8px;}

  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(20,31,25,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--border-subtle);
    display:flex; justify-content:center;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bottom-nav-inner{max-width:480px; width:100%; display:flex;}
  .nav-btn{flex:1; background:none; border:none; padding:12px 0 10px; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--text-muted); font-size:11px; font-weight:600;}
  .nav-btn.active{color:var(--accent);}

  .settings-block{margin:0 20px 24px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:16px; padding:16px;}
  .settings-block h3{margin:0 0 12px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-secondary);}
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--bg-elevated); border:1px solid var(--border-subtle);
    border-radius:10px; padding:11px 12px; color:var(--text-primary); font-size:15px; font-family:inherit;
  }
  .field textarea{resize:vertical; min-height:56px;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .field select:disabled{color:var(--text-muted);}
  .hint{font-size:11px; color:var(--text-muted); margin-top:6px;}

  .settings-event-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border-subtle);}
  .settings-event-row:last-child{border-bottom:none;}
  .settings-event-row .info .name{font-size:14px; font-weight:700;}
  .settings-event-row .info .date{font-size:12px; color:var(--text-secondary); margin-top:2px;}
  .settings-event-row .info .obs{font-size:11.5px; color:var(--text-muted); margin-top:2px; font-style:italic;}
  .obs{font-size:12.5px; color:var(--text-secondary); font-style:italic; line-height:1.4;}
  .row-actions{display:flex; gap:8px; flex-shrink:0;}
  .icon-btn{background:var(--bg-elevated); border:1px solid var(--border-subtle); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);}
  .icon-btn.danger-btn{color:var(--status-danger);}
  .tag-pill{font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:2px 7px; border-radius:20px; margin-left:8px; vertical-align:middle;}
  .tag-pill.attn{background:var(--accent-dim); color:var(--accent);}
  .tag-pill.mile{background:var(--bg-elevated); color:var(--text-muted); border:1px solid var(--border-subtle);}

  .add-btn{width:100%; background:var(--accent-dim); color:var(--accent); border:1px dashed var(--accent); border-radius:10px; padding:12px; font-size:14px; font-weight:700; margin-top:14px;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50; display:flex; align-items:flex-end; justify-content:center;}
  .modal{background:var(--bg-surface); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto; border:1px solid var(--border-subtle); border-bottom:none;}
  .modal h2{margin:0 0 16px; font-size:17px; font-weight:800;}
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .btn{flex:1; border-radius:10px; padding:13px; font-size:15px; font-weight:700; border:none;}
  .btn-primary{background:var(--accent); color:#0d1512;}
  .btn-secondary{background:var(--bg-elevated); color:var(--text-secondary); border:1px solid var(--border-subtle);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
const e = React.createElement;
const useState = React.useState;
const useEffect = React.useEffect;
const useMemo = React.useMemo;

const STORAGE_KEY = "japhe_farm_v1";

// kind: "milestone" = one-time crop-stage marker (Season timeline).
// kind: "attention" = recurring action worth checking regularly.
const CATEGORIES = [
  { id: "nursery",    label: "Nursery preparation",       kind: "milestone" },
  { id: "sowing",     label: "Sowing",                     kind: "milestone" },
  { id: "land_prep",  label: "Land preparation",           kind: "milestone" },
  { id: "fertilizer", label: "Fertilizer application",     kind: "attention" },
  { id: "spray",      label: "Spraying (pest/disease)",    kind: "attention" },
  { id: "weeding",    label: "Weeding",                     kind: "attention" },
  { id: "mulch",      label: "Mulching / removing mulch",  kind: "attention" },
  { id: "irrigation", label: "Irrigation / watering",      kind: "attention" },
  { id: "harvest",    label: "Harvest",                     kind: "milestone" },
  { id: "custom",     label: "Custom",                      kind: "attention" }
];

// Priority order for "Needs your attention" — most important first. The section fills with
// whichever of these already have data, skipping any not logged yet instead of showing a blank slot.
const FULL_PRIORITY = ["fertilizer", "spray", "weeding", "irrigation", "mulch", "custom"];
const TOP_N = 4;

const SPRAY_TYPES = ["Insecticide", "Fungicide", "Herbicide", "Other"];

// Observation form options — all optional at entry. Objective (measurable) fields are kept
// separate from subjective (perception) fields so it's clear which is which later on.
const OBS_STAGE_OPTIONS = ["Germination & establishment", "Vegetative growth", "Bulb development", "Maturation", "Ready for harvest check"];
const OBS_MOISTURE_OPTIONS = ["Wet", "Moist", "Dry"];
const OBS_LEAF_COLOR_OPTIONS = ["Dark green", "Green", "Light green", "Yellowing"];
const OBS_PEST_OPTIONS = ["None seen", "Thrips", "Cutworms", "Other"];
const OBS_DISEASE_OPTIONS = ["None seen", "Spots", "Rot", "Wilting"];

function categoryMeta(id){
  return CATEGORIES.find(function(c){ return c.id === id; }) || { id:id, label:id, kind:"attention" };
}
function categoryLabel(id){ return categoryMeta(id).label; }

function seedData(){
  return {
    farm: { name: "Japhe Farm", cropType: "onion" },
    events: [
      { id: "e1", categoryId: "nursery",    date: "2026-06-19" },
      { id: "e2", categoryId: "sowing",     date: "2026-06-23" },
      { id: "e3", categoryId: "land_prep",  date: "2026-06-27" },
      { id: "e4", categoryId: "mulch",      date: "2026-07-13" },
      { id: "e5", categoryId: "weeding",    date: "2026-07-14" },
      { id: "e6", categoryId: "fertilizer", date: "2026-07-16" }
    ],
    observations: []
  };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return seedData();
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.farm || !parsed.events) return seedData();
    if(!parsed.observations) parsed.observations = []; // migrate saves from before Observations existed
    return parsed;
  }catch(err){ return seedData(); }
}
function saveState(state){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(err){} }

function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function daysSince(dateStr){
  const start = new Date(dateStr + "T00:00:00");
  const now = new Date();
  const startMid = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((nowMid - startMid) / 86400000);
}
function formatDateDisplay(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-GB", { day:"2-digit", month:"long", year:"numeric" });
}
function urgencyClass(days){ if(days >= 30) return "danger"; if(days >= 14) return "warn"; return "ok"; }
function urgencyColorVar(days){ if(days >= 30) return "var(--status-danger)"; if(days >= 14) return "var(--status-warning)"; return "var(--status-success)"; }
function ordinalLabel(n){ if(n===1) return "1st"; if(n===2) return "2nd"; if(n===3) return "3rd"; return n+"th"; }
function relativeLabel(days){
  if(days === 0) return "Today";
  if(days === 1) return "Yesterday";
  if(days < 0) return "Upcoming";
  return days + " days ago";
}

function withOrdinals(events){
  const byCat = {};
  events.slice().sort(function(a,b){ return a.date.localeCompare(b.date); }).forEach(function(ev){
    byCat[ev.categoryId] = (byCat[ev.categoryId] || 0) + 1;
    ev._ordinal = byCat[ev.categoryId];
  });
  return events;
}

function eventDisplayName(ev){
  const cat = categoryMeta(ev.categoryId);
  if(ev.categoryId === "spray") return "Spraying — " + (ev.sprayType || "Insecticide");
  if(ev.categoryId === "fertilizer" && ev.fertilizerType) return "Fertilizer application — " + ev.fertilizerType + (ev.quantityKg ? ", " + ev.quantityKg + "kg" : "");
  if(ev.label) return ev.label;
  return cat.label;
}

// Imperative phrasing for the Next Action cards — "what to do", not "what was logged".
const ACTION_VERB = {
  fertilizer: "Apply fertilizer",
  spray: "Spray",
  weeding: "Weed the field",
  mulch: "Manage mulch",
  irrigation: "Water the crop",
  custom: "Custom activity"
};
function nextActionTitle(ev){
  if(ev.categoryId === "fertilizer"){
    const detail = ev.fertilizerType ? (" — " + ev.fertilizerType + (ev.quantityKg ? ", " + ev.quantityKg + "kg" : "")) : "";
    return "Apply fertilizer" + detail;
  }
  if(ev.categoryId === "spray") return "Spray — " + (ev.sprayType || "Insecticide");
  return ACTION_VERB[ev.categoryId] || eventDisplayName(ev);
}

function RingGauge(props){
  const days = props.days, size = props.size || 52, stroke = props.stroke || 5, neutral = props.neutral;
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, days / 30));
  const color = neutral ? "var(--accent-sage)" : urgencyColorVar(days);
  const numClass = neutral ? "neutral" : urgencyClass(days);
  return e("div", { className:"ring-wrap", style:{ width:size, height:size } },
    e("svg", { width:size, height:size },
      e("circle", { cx:size/2, cy:size/2, r:r, fill:"none", stroke:"var(--bg-elevated)", strokeWidth:stroke }),
      e("circle", { cx:size/2, cy:size/2, r:r, fill:"none", stroke:color, strokeWidth:stroke, strokeDasharray:c, strokeDashoffset:c*(1-pct), strokeLinecap:"round" })
    ),
    e("div", { className:"ring-num mono " + numClass }, days < 0 ? "—" : days)
  );
}

function TopAttentionCard(props){
  const ev = props.ev;
  const days = daysSince(ev.date);
  return e("div", { className:"event-card", key: ev.id },
    e(RingGauge, { days: days }),
    e("div", { className:"ev-mid" },
      e("div", { className:"ev-name" }, nextActionTitle(ev)),
      e("div", { className:"ev-sub" }, ordinalLabel(ev._ordinal) + " time · last done " + relativeLabel(days)),
      ev.observation ? e("div", { className:"ev-obs" }, "“" + ev.observation + "”") : null
    )
  );
}

function TimelineItem(ev){
  const days = daysSince(ev.date);
  return e("div", { className:"tl-item", key: ev.id },
    e("div", { className:"tl-line" }), e("div", { className:"tl-dot" }),
    e("div", { className:"tl-name" }, eventDisplayName(ev)),
    e("div", { className:"tl-date" }, relativeLabel(days))
  );
}

const STAGES = [
  { max: 15, label: "Germination & establishment" },
  { max: 40, label: "Vegetative growth" },
  { max: 70, label: "Bulb development" },
  { max: 100, label: "Maturation" },
  { max: Infinity, label: "Ready for harvest check" }
];
function stageForDays(days){
  for(var i = 0; i < STAGES.length; i++){ if(days <= STAGES[i].max) return STAGES[i].label; }
  return STAGES[STAGES.length-1].label;
}

function healthStatus(latestByCat){
  const cats = FULL_PRIORITY.filter(function(id){ return !!latestByCat[id]; });
  if(cats.length === 0) return { label: "Not enough data yet", cls: "neutral" };
  let worst = "ok";
  cats.forEach(function(id){
    const uc = urgencyClass(daysSince(latestByCat[id].date));
    if(uc === "danger") worst = "danger";
    else if(uc === "warn" && worst !== "danger") worst = "warn";
  });
  if(worst === "danger") return { label: "Needs attention", cls: "danger" };
  if(worst === "warn") return { label: "Keep an eye", cls: "warn" };
  return { label: "On track", cls: "ok" };
}

function computeNextAction(latestByCat){
  const cats = FULL_PRIORITY.filter(function(id){ return !!latestByCat[id]; });
  if(cats.length === 0) return null;
  let best = null;
  cats.forEach(function(id){
    const ev = latestByCat[id];
    const uc = urgencyClass(daysSince(ev.date));
    const score = uc === "danger" ? 2 : uc === "warn" ? 1 : 0;
    if(!best || score > best.score){ best = { catId:id, ev:ev, score:score }; }
  });
  return best;
}

function observationSummaryText(o){
  if(o.notes && o.notes.trim()) return o.notes.trim();
  const parts = [];
  if(o.observedStage) parts.push(o.observedStage);
  if(o.leafCount != null && o.leafCount !== "") parts.push(o.leafCount + " leaves");
  if(o.heightCm != null && o.heightCm !== "") parts.push(o.heightCm + "cm");
  if(o.soilMoisture) parts.push("Soil: " + o.soilMoisture);
  if(o.leafColor) parts.push("Leaf: " + o.leafColor);
  if(o.pestPresence && o.pestPresence !== "None seen") parts.push("Pest: " + o.pestPresence);
  if(o.diseaseSymptoms && o.diseaseSymptoms !== "None seen") parts.push("Disease: " + o.diseaseSymptoms);
  return parts.length ? parts.join(" · ") : "Field check logged";
}

// Merges the quick observation notes on fertilizer/spray events with the dedicated
// Observation log, and returns whichever is most recent, in one shared shape.
function latestFieldNote(state){
  const items = [];
  state.events.forEach(function(ev){
    if(ev.observation && ev.observation.trim()){
      items.push({ date: ev.date, text: ev.observation.trim(), source: eventDisplayName(ev) });
    }
  });
  (state.observations || []).forEach(function(o){
    items.push({ date: o.date, text: observationSummaryText(o), source: "Field observation" });
  });
  if(items.length === 0) return null;
  return items.sort(function(a,b){ return b.date.localeCompare(a.date); })[0];
}

          onDeleteEvent: function(id){ setConfirmDeleteId(id); },
          onQuickAdd: function(catId){ openAddModal(catId); },
          onEditObservation: openEditObsModal,
          onDeleteObservation: function(id){ setObsConfirmDeleteId(id); }
        }))
      : e(SettingsScreen, { state: state, onUpdateFarm: updateFarm, onOpenAddEvent: function(){ openAddModal(); },
          onOpenAddObservation: openAddObsModal }),

    modalOpen && e("div", { className:"modal-overlay", onClick: function(ev){ if(ev.target===ev.currentTarget) setModalOpen(false); } },
      e("div", { className:"modal" },
        e("h2", null, editingId ? "Edit event" : "Add event"),
        e("div", { className:"field" }, e("label", null, "Event type"),
          e("select", { value: formCategory, onChange: function(ev){ setFormCategory(ev.target.value); } },
            CATEGORIES.map(function(c){ return e("option", { value:c.id, key:c.id }, c.label + (c.kind==="milestone" ? " (timeline)" : "")); })
          )
        ),
        formCategory === "spray" && e("div", { className:"field" }, e("label", null, "Spray type"),
          e("select", { value: formSprayType, onChange: function(ev){ setFormSprayType(ev.target.value); } },
            SPRAY_TYPES.map(function(t){ return e("option", { value:t, key:t }, t); })
          )
        ),
        formCategory === "fertilizer" && e("div", { className:"field" }, e("label", null, "Fertilizer type"),
          e("input", { value: formFertilizerType, placeholder: "e.g. CAN, DAP, Urea, NPK", onChange: function(ev){ setFormFertilizerType(ev.target.value); } })
        ),
        formCategory === "fertilizer" && e("div", { className:"field" }, e("label", null, "Quantity (kg)"),
          e("input", { type:"number", inputMode:"decimal", value: formQuantityKg, placeholder: "e.g. 50", onChange: function(ev){ setFormQuantityKg(ev.target.value); } })
        ),
        e("div", { className:"field" }, e("label", null, "Date"),
          e("input", { type:"date", value: formDate, onChange: function(ev){ setFormDate(ev.target.value); } })),

        isRichCategory
          ? e("div", { className:"field" }, e("label", null, "Observation"),
              e("textarea", {
                value: formObservation,
                placeholder: formCategory === "spray" ? "e.g. thrips on leaves, north side" : "e.g. slight yellowing before application",
                onChange: function(ev){ setFormObservation(ev.target.value); }
              }),
              e("div", { className:"hint" }, "What you noticed — this is worth recording every time."))
          : e("div", { className:"field" }, e("label", null, "Note (optional)"),
              e("input", { value: formLabel, placeholder: categoryLabel(formCategory), onChange: function(ev){ setFormLabel(ev.target.value); } })),

        e("div", { className:"modal-actions" },
          e("button", { className:"btn btn-secondary", onClick: function(){ setModalOpen(false); } }, "Cancel"),
          e("button", { className:"btn btn-primary", onClick: submitForm }, editingId ? "Save" : "Add")
        )
      )
    ),

    confirmDeleteId && e("div", { className:"modal-overlay", onClick: function(ev){ if(ev.target===ev.currentTarget) setConfirmDeleteId(null); } },
      e("div", { className:"modal" },
        e("h2", null, "Delete this event?"),
        e("div", { className:"hint" }, "This can't be undone."),
        e("div", { className:"modal-actions" },
          e("button", { className:"btn btn-secondary", onClick: function(){ setConfirmDeleteId(null); } }, "Cancel"),
          e("button", { className:"btn btn-primary", style:{background:"var(--status-danger)", color:"#fff"}, onClick: function(){ deleteEvent(confirmDeleteId); setConfirmDeleteId(null); } }, "Delete")
        )
      )
    ),

    obsModalOpen && e("div", { className:"modal-overlay", onClick: function(ev){ if(ev.target===ev.currentTarget) setObsModalOpen(false); } },
      e("div", { className:"modal" },
        e("h2", null, obsEditingId ? "Edit observation" : "Add observation"),
        e("div", { className:"hint", style:{ marginBottom:"12px" } }, "Fill in only what you actually saw today — skip the rest."),
        e("div", { className:"field" }, e("label", null, "Date"),
          e("input", { type:"date", value: obsDate, onChange: function(ev){ setObsDate(ev.target.value); } })),
        e(OptionalSelect, { label:"Growth stage", value: obsStage, onChange: setObsStage, options: OBS_STAGE_OPTIONS }),
        e("div", { className:"field" }, e("label", null, "Leaf count (optional)"),
          e("input", { type:"number", inputMode:"numeric", value: obsLeafCount, placeholder:"e.g. 4", onChange: function(ev){ setObsLeafCount(ev.target.value); } })),
        e("div", { className:"field" }, e("label", null, "Plant height, cm (optional)"),
          e("input", { type:"number", inputMode:"decimal", value: obsHeightCm, placeholder:"e.g. 15", onChange: function(ev){ setObsHeightCm(ev.target.value); } })),
        e(OptionalSelect, { label:"Soil moisture", value: obsMoisture, onChange: setObsMoisture, options: OBS_MOISTURE_OPTIONS }),
        e(OptionalSelect, { label:"Leaf colour", value: obsLeafColor, onChange: setObsLeafColor, options: OBS_LEAF_COLOR_OPTIONS }),
        e(OptionalSelect, { label:"Pests seen", value: obsPest, onChange: setObsPest, options: OBS_PEST_OPTIONS }),
        e(OptionalSelect, { label:"Disease symptoms", value: obsDisease, onChange: setObsDisease, options: OBS_DISEASE_OPTIONS }),
        e("div", { className:"field" }, e("label", null, "Notes (optional)"),
          e("textarea", { value: obsNotes, placeholder:"Anything else worth remembering", onChange: function(ev){ setObsNotes(ev.target.value); } })),
        e("div", { className:"modal-actions" },
          e("button", { className:"btn btn-secondary", onClick: function(){ setObsModalOpen(false); } }, "Cancel"),
          e("button", { className:"btn btn-primary", onClick: submitObsForm }, obsEditingId ? "Save" : "Add")
        )
      )
    ),

    obsConfirmDeleteId && e("div", { className:"modal-overlay", onClick: function(ev){ if(ev.target===ev.currentTarget) setObsConfirmDeleteId(null); } },
      e("div", { className:"modal" },
        e("h2", null, "Delete this observation?"),
        e("div", { className:"hint" }, "This can't be undone."),
        e("div", { className:"modal-actions" },
          e("button", { className:"btn btn-secondary", onClick: function(){ setObsConfirmDeleteId(null); } }, "Cancel"),
          e("button", { className:"btn btn-primary", style:{background:"var(--status-danger)", color:"#fff"}, onClick: function(){ deleteObservation(obsConfirmDeleteId); setObsConfirmDeleteId(null); } }, "Delete")
        )
      )
    ),

    e("div", { className:"bottom-nav" },
      e("div", { className:"bottom-nav-inner" },
        e("button", { className:"nav-btn" + (tab==="home" ? " active" : ""), onClick: function(){ setTab("home"); } }, IconHome(tab==="home"), e("span", null, "Home")),
        e("button", { className:"nav-btn" + (tab==="history" ? " active" : ""), onClick: function(){ setTab("history"); } }, IconHistory(tab==="history"), e("span", null, "History")),
        e("button", { className:"nav-btn" + (tab==="settings" ? " active" : ""), onClick: function(){ setTab("settings"); } }, IconSettings(tab==="settings"), e("span", null, "Settings"))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));

if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(err){
      console.warn("Service worker registration failed:", err);
    });
  });
}
</script>
</body>
</html>
